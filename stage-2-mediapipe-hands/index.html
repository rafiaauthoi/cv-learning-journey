<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Stage 2: MediaPipe Hands</title>
  <style>
    body {
      background-color: #0a0a0a;
      color: #eaeaea;
      font-family: monospace;
      text-align: center;
      padding-top: 30px;
    }

    h1 {
      color: #ff2fb0;
    }

    #video-wrapper {
      position: relative;
      width: 640px;
      height: 480px;
      margin: 0 auto;
      border: 2px solid #ff2fb0;
      border-radius: 8px;
      overflow: hidden;
    }

    video {
      width: 640px;
      height: 480px;
      transform: scaleX(-1);
    }

    #status {
      margin-top: 12px;
      font-size: 14px;
      color: #888;
    }

    #coords {
      margin-top: 20px;
      font-size: 13px;
      color: #7fffd4;
      text-align: left;
      display: inline-block;
      max-width: 640px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

  <h1>Stage 2: MediaPipe Hands</h1>
  <div id="video-wrapper">
    <video id="webcam" autoplay playsinline></video>
  </div>
  <p id="status">Loading hand tracking model...</p>
  <div id="coords">Waiting for hand detection...</div>

  <script type="module">
    import {
      HandLandmarker,
      FilesetResolver
    } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

    const video = document.getElementById('webcam');
    const status = document.getElementById('status');
    const coordsDisplay = document.getElementById('coords');

    let handLandmarker;

    async function setupHandLandmarker() {
      const vision = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
      );

      handLandmarker = await HandLandmarker.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath:
            "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
          delegate: "GPU"
        },
        runningMode: "VIDEO",
        numHands: 2
      });

      status.textContent = "Model loaded. Starting camera...";
      startWebcam();
    }

    async function startWebcam() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: true,
          audio: false
        });
        video.srcObject = stream;

        video.addEventListener('loadeddata', () => {
          status.textContent = "Tracking active. Move your hand in front of the camera.";
          detectLoop();
        });
      } catch (error) {
        status.textContent = "Camera access failed: " + error.message;
      }
    }

    function detectLoop() {
      const now = performance.now();
      const results = handLandmarker.detectForVideo(video, now);

      if (results.landmarks && results.landmarks.length > 0) {
        let output = "";
        results.landmarks.forEach((hand, handIndex) => {
          output += "Hand " + (handIndex + 1) + ":\n";
          const wrist = hand[0];
          const indexTip = hand[8];
          const thumbTip = hand[4];
          output += "  Wrist: x=" + wrist.x.toFixed(3) + " y=" + wrist.y.toFixed(3) + "\n";
          output += "  Index tip: x=" + indexTip.x.toFixed(3) + " y=" + indexTip.y.toFixed(3) + "\n";
          output += "  Thumb tip: x=" + thumbTip.x.toFixed(3) + " y=" + thumbTip.y.toFixed(3) + "\n";
        });
        coordsDisplay.textContent = output;
      } else {
        coordsDisplay.textContent = "No hand detected.";
      }

      requestAnimationFrame(detectLoop);
    }

    setupHandLandmarker();
  </script>

</body>
</html>
