<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Stage 3: Canvas Overlay</title>
  <style>
    body {
      background-color: #0a0a0a;
      color: #eaeaea;
      font-family: monospace;
      text-align: center;
      padding-top: 30px;
    }

    h1 {
      color: #ff2fb0;
    }

    #video-wrapper {
      position: relative;
      width: 640px;
      height: 480px;
      margin: 0 auto;
      border: 2px solid #ff2fb0;
      border-radius: 8px;
      overflow: hidden;
    }

    video {
      position: absolute;
      top: 0;
      left: 0;
      width: 640px;
      height: 480px;
      transform: scaleX(-1);
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 640px;
      height: 480px;
      transform: scaleX(-1);
    }

    #status {
      margin-top: 12px;
      font-size: 14px;
      color: #888;
    }
  </style>
</head>
<body>

  <h1>Stage 3: Canvas Overlay</h1>
  <div id="video-wrapper">
    <video id="webcam" autoplay playsinline></video>
    <canvas id="overlay" width="640" height="480"></canvas>
  </div>
  <p id="status">Loading hand tracking model...</p>

  <script type="module">
    import {
      HandLandmarker,
      FilesetResolver
    } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

    const video = document.getElementById('webcam');
    const canvas = document.getElementById('overlay');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');

    // landmark indices for each fingertip, wrist not included here
    const FINGERTIP_INDICES = [4, 8, 12, 16, 20];

    let handLandmarker;

    async function setupHandLandmarker() {
      const vision = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
      );

      handLandmarker = await HandLandmarker.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath:
            "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
          delegate: "GPU"
        },
        runningMode: "VIDEO",
        numHands: 2
      });

      status.textContent = "Model loaded. Starting camera...";
      startWebcam();
    }

    async function startWebcam() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: true,
          audio: false
        });
        video.srcObject = stream;

        video.addEventListener('loadeddata', () => {
          status.textContent = "Tracking active. Move your hand in front of the camera.";
          detectLoop();
        });
      } catch (error) {
        status.textContent = "Camera access failed: " + error.message;
      }
    }

    function drawGlowDot(x, y) {
      // x and y arrive as 0 to 1, convert to actual pixel positions
      const pixelX = x * canvas.width;
      const pixelY = y * canvas.height;

      // outer glow, soft and larger
      const gradient = ctx.createRadialGradient(pixelX, pixelY, 0, pixelX, pixelY, 25);
      gradient.addColorStop(0, 'rgba(255, 47, 176, 0.8)');
      gradient.addColorStop(1, 'rgba(255, 47, 176, 0)');
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(pixelX, pixelY, 25, 0, Math.PI * 2);
      ctx.fill();

      // inner solid core
      ctx.fillStyle = '#ff2fb0';
      ctx.beginPath();
      ctx.arc(pixelX, pixelY, 6, 0, Math.PI * 2);
      ctx.fill();
    }

    function detectLoop() {
      try {
        const now = performance.now();
        const results = handLandmarker.detectForVideo(video, now);

        // clear the previous frame's drawing before drawing the new one
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (results.landmarks && results.landmarks.length > 0) {
          results.landmarks.forEach((hand) => {
            FINGERTIP_INDICES.forEach((index) => {
              const point = hand[index];
              drawGlowDot(point.x, point.y);
            });
          });
        }
      } catch (error) {
        console.error("Detection loop error:", error);
      }

      // requestAnimationFrame runs even if an error happened above,
      // so one bad frame can no longer stop the whole loop
      requestAnimationFrame(detectLoop);
    }

    setupHandLandmarker();
  </script>

</body>
</html>
