<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Stage 6: Face Tracking</title>
  <style>
    body {
      background-color: #0a0a0a;
      color: #eaeaea;
      font-family: monospace;
      text-align: center;
      padding-top: 30px;
    }

    h1 {
      color: #ff2fb0;
    }

    #video-wrapper {
      position: relative;
      width: 640px;
      height: 480px;
      margin: 0 auto;
      border: 2px solid #ff2fb0;
      border-radius: 8px;
      overflow: hidden;
    }

    video {
      position: absolute;
      top: 0;
      left: 0;
      width: 640px;
      height: 480px;
      transform: scaleX(-1);
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 640px;
      height: 480px;
      transform: scaleX(-1);
    }

    #status {
      margin-top: 12px;
      font-size: 14px;
      color: #888;
    }
  </style>
</head>
<body>

  <h1>Stage 6: Face Tracking</h1>
  <div id="video-wrapper">
    <video id="webcam" autoplay playsinline></video>
    <canvas id="overlay" width="640" height="480"></canvas>
  </div>
  <p id="status">Loading face tracking model...</p>

  <script type="module">
    import {
      FaceLandmarker,
      FilesetResolver
    } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

    const video = document.getElementById('webcam');
    const canvas = document.getElementById('overlay');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');

    let faceLandmarker;

    async function setupFaceLandmarker() {
      const vision = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
      );

      faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath:
            "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
          delegate: "GPU"
        },
        runningMode: "VIDEO",
        numFaces: 1
      });

      status.textContent = "Model loaded. Starting camera...";
      startWebcam();
    }

    async function startWebcam() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: true,
          audio: false
        });
        video.srcObject = stream;

        video.addEventListener('loadeddata', () => {
          status.textContent = "Tracking active. Face the camera directly.";
          detectLoop();
        });
      } catch (error) {
        status.textContent = "Camera access failed: " + error.message;
      }
    }

    // a simplified set of connections, drawing the jawline, eyes, eyebrows, and lips
    // rather than all 478 points, this keeps the scan looking clean instead of noisy
    const FACE_OUTLINE = [
      10, 338, 297, 332, 284, 251, 389, 356, 454, 323, 361, 288,
      397, 365, 379, 378, 400, 377, 152, 148, 176, 149, 150, 136,
      172, 58, 132, 93, 234, 127, 162, 21, 54, 103, 67, 109, 10
    ];

    const LEFT_EYE = [33, 160, 158, 133, 153, 144, 33];
    const RIGHT_EYE = [362, 385, 387, 263, 373, 380, 362];
    const LIPS = [61, 39, 0, 269, 291, 405, 17, 181, 61];

    function drawConnectedPoints(points, landmarks, color) {
      ctx.strokeStyle = color;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      points.forEach((index, i) => {
        const point = landmarks[index];
        const x = point.x * canvas.width;
        const y = point.y * canvas.height;
        if (i === 0) {
          ctx.moveTo(x, y);
        } else {
          ctx.lineTo(x, y);
        }
      });
      ctx.stroke();
    }

    function drawScanBox(landmarks) {
      // find the bounding box of all face points to draw a "scanning" frame around the face
      let minX = 1, minY = 1, maxX = 0, maxY = 0;
      landmarks.forEach((point) => {
        if (point.x < minX) minX = point.x;
        if (point.x > maxX) maxX = point.x;
        if (point.y < minY) minY = point.y;
        if (point.y > maxY) maxY = point.y;
      });

      const x = minX * canvas.width;
      const y = minY * canvas.height;
      const width = (maxX - minX) * canvas.width;
      const height = (maxY - minY) * canvas.height;

      ctx.strokeStyle = '#7fffd4';
      ctx.lineWidth = 2;
      ctx.strokeRect(x, y, width, height);

      // corner brackets, classic sci-fi scan look
      const cornerSize = 15;
      ctx.strokeStyle = '#ff2fb0';
      ctx.lineWidth = 3;

      // top left
      ctx.beginPath();
      ctx.moveTo(x, y + cornerSize);
      ctx.lineTo(x, y);
      ctx.lineTo(x + cornerSize, y);
      ctx.stroke();

      // top right
      ctx.beginPath();
      ctx.moveTo(x + width - cornerSize, y);
      ctx.lineTo(x + width, y);
      ctx.lineTo(x + width, y + cornerSize);
      ctx.stroke();

      // bottom left
      ctx.beginPath();
      ctx.moveTo(x, y + height - cornerSize);
      ctx.lineTo(x, y + height);
      ctx.lineTo(x + cornerSize, y + height);
      ctx.stroke();

      // bottom right
      ctx.beginPath();
      ctx.moveTo(x + width - cornerSize, y + height);
      ctx.lineTo(x + width, y + height);
      ctx.lineTo(x + width, y + height - cornerSize);
      ctx.stroke();
    }

    function detectLoop() {
      try {
        const now = performance.now();
        const results = faceLandmarker.detectForVideo(video, now);

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (results.faceLandmarks && results.faceLandmarks.length > 0) {
          const face = results.faceLandmarks[0];

          drawScanBox(face);
          drawConnectedPoints(FACE_OUTLINE, face, 'rgba(255, 47, 176, 0.6)');
          drawConnectedPoints(LEFT_EYE, face, 'rgba(127, 255, 212, 0.8)');
          drawConnectedPoints(RIGHT_EYE, face, 'rgba(127, 255, 212, 0.8)');
          drawConnectedPoints(LIPS, face, 'rgba(127, 255, 212, 0.8)');
        }

      } catch (error) {
        console.error("Detection loop error:", error);
      }

      requestAnimationFrame(detectLoop);
    }

    setupFaceLandmarker();
  </script>

</body>
</html>
