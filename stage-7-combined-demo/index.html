<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Stage 7: Combined Demo</title>
  <script src="https://cdn.jsdelivr.net/npm/tone@14.8.49/build/Tone.js"></script>
  <style>
    body {
      background-color: #0a0a0a;
      color: #eaeaea;
      font-family: monospace;
      text-align: center;
      padding-top: 30px;
    }

    h1 {
      color: #ff2fb0;
    }

    #video-wrapper {
      position: relative;
      width: 640px;
      height: 480px;
      margin: 0 auto;
      border: 2px solid #ff2fb0;
      border-radius: 8px;
      overflow: hidden;
      background-color: #000;
    }

    video {
      position: absolute;
      top: 0;
      left: 0;
      width: 640px;
      height: 480px;
      transform: scaleX(-1);
      opacity: 0.5;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 640px;
      height: 480px;
      transform: scaleX(-1);
    }

    #hud-text {
      position: absolute;
      top: 20px;
      left: 0;
      width: 100%;
      text-align: center;
      color: #7fffd4;
      font-size: 20px;
      font-weight: bold;
      text-shadow: 0 0 10px #7fffd4;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    #status {
      margin-top: 12px;
      font-size: 14px;
      color: #888;
    }

    #startButton {
      margin-top: 20px;
      background-color: #ff2fb0;
      color: #0a0a0a;
      border: none;
      padding: 12px 24px;
      font-family: monospace;
      font-size: 14px;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
    }

    #startButton:hover {
      background-color: #ff5fc4;
    }

    #mode-display {
      margin-top: 20px;
      font-size: 16px;
      color: #7fffd4;
    }
  </style>
</head>
<body>

  <h1>Stage 7: Combined Demo</h1>

  <button id="startButton">Start Demo</button>

  <div id="video-wrapper">
    <video id="webcam" autoplay playsinline></video>
    <canvas id="overlay" width="640" height="480"></canvas>
    <div id="hud-text">ENERGY CHARGED</div>
  </div>
  <p id="status">Click "Start Demo" to begin.</p>
  <div id="mode-display">Mode: --</div>

  <script type="module">
    import {
      HandLandmarker,
      FilesetResolver
    } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

    const video = document.getElementById('webcam');
    const canvas = document.getElementById('overlay');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');
    const startButton = document.getElementById('startButton');
    const modeDisplay = document.getElementById('mode-display');
    const hudText = document.getElementById('hud-text');

    const FINGERTIP_INDICES = [4, 8, 12, 16, 20];
    const PINCH_DISTANCE_THRESHOLD = 0.05;
    const RAISE_Y_THRESHOLD = 0.35;

    let handLandmarker;
    let synth;
    let wasPinching = false;

    // ambient particles for idle mode, each one floats and pulses independently
    const particles = [];
    for (let i = 0; i < 25; i++) {
      particles.push({
        x: Math.random() * 640,
        y: Math.random() * 480,
        radius: Math.random() * 3 + 1,
        speed: Math.random() * 0.4 + 0.1,
        angle: Math.random() * Math.PI * 2,
        pulseOffset: Math.random() * Math.PI * 2
      });
    }

    startButton.addEventListener('click', async () => {
      await Tone.start();
      synth = new Tone.Synth().toDestination();
      synth.volume.value = -15;

      startButton.textContent = "Demo Running";
      startButton.disabled = true;
      status.textContent = "Loading hand tracking model...";

      setupHandLandmarker();
    });

    async function setupHandLandmarker() {
      const vision = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
      );

      handLandmarker = await HandLandmarker.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath:
            "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
          delegate: "GPU"
        },
        runningMode: "VIDEO",
        numHands: 1
      });

      status.textContent = "Model loaded. Starting camera...";
      startWebcam();
    }

    async function startWebcam() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: true,
          audio: false
        });
        video.srcObject = stream;

        video.addEventListener('loadeddata', () => {
          status.textContent = "Demo active. Move your hand into frame.";
          animationLoop();
        });
      } catch (error) {
        status.textContent = "Camera access failed: " + error.message;
      }
    }

    function drawGlowDot(x, y, radius, color) {
      const pixelX = x * canvas.width;
      const pixelY = y * canvas.height;

      const gradient = ctx.createRadialGradient(pixelX, pixelY, 0, pixelX, pixelY, radius);
      gradient.addColorStop(0, color.glow);
      gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(pixelX, pixelY, radius, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = color.core;
      ctx.beginPath();
      ctx.arc(pixelX, pixelY, radius / 4, 0, Math.PI * 2);
      ctx.fill();
    }

    function getDistance(pointA, pointB) {
      const dx = pointA.x - pointB.x;
      const dy = pointA.y - pointB.y;
      return Math.sqrt(dx * dx + dy * dy);
    }

    function drawIdleParticles(time) {
      particles.forEach((p) => {
        // drift slowly in a circular wander pattern
        p.x += Math.cos(p.angle) * p.speed;
        p.y += Math.sin(p.angle) * p.speed;

        // wrap around edges instead of disappearing
        if (p.x < 0) p.x = 640;
        if (p.x > 640) p.x = 0;
        if (p.y < 0) p.y = 480;
        if (p.y > 480) p.y = 0;

        // pulse size gently using a sine wave over time
        const pulse = Math.sin(time / 500 + p.pulseOffset) * 0.5 + 1;
        const displayRadius = p.radius * 4 * pulse;

        drawGlowDot(p.x / 640, p.y / 480, displayRadius, {
          glow: 'rgba(127, 255, 212, 0.5)',
          core: 'rgba(127, 255, 212, 0.9)'
        });
      });
    }

    function showHudMessage() {
      hudText.style.opacity = '1';
      setTimeout(() => {
        hudText.style.opacity = '0';
      }, 800);
    }

    function animationLoop() {
      try {
        const now = performance.now();
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const results = handLandmarker.detectForVideo(video, now);
        const handFound = results.landmarks && results.landmarks.length > 0;

        if (!handFound) {
          // IDLE MODE
          modeDisplay.textContent = "Mode: Idle";
          drawIdleParticles(now);
          wasPinching = false;
        } else {
          // ACTIVE MODE
          modeDisplay.textContent = "Mode: Active";
          const hand = results.landmarks[0];
          const thumbTip = hand[4];
          const indexTip = hand[8];
          const wrist = hand[0];

          const pinchDistance = getDistance(thumbTip, indexTip);
          const isPinching = pinchDistance < PINCH_DISTANCE_THRESHOLD;
          const isRaised = wrist.y < RAISE_Y_THRESHOLD;

          const dotColor = isPinching
            ? { glow: 'rgba(127, 255, 212, 0.8)', core: '#7fffd4' }
            : { glow: 'rgba(255, 47, 176, 0.8)', core: '#ff2fb0' };

          FINGERTIP_INDICES.forEach((index) => {
            const point = hand[index];
            drawGlowDot(point.x, point.y, 25, dotColor);
          });

          // trigger sound only on the moment a pinch begins, not every frame while held
          if (isPinching && !wasPinching) {
            const frequency = 400 + (1 - wrist.y) * 400;
            synth.triggerAttackRelease(frequency, "8n");
          }
          wasPinching = isPinching;

          if (isRaised) {
            showHudMessage();
          }
        }

      } catch (error) {
        console.error("Animation loop error:", error);
      }

      requestAnimationFrame(animationLoop);
    }
  </script>

</body>
</html>
